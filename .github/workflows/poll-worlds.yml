name: Poll live worlds

# Public repo => unlimited free GitHub Actions. Fetches the game's public discovery
# server (port 8902 - Cloudflare Workers cannot, GitHub runners can) and writes the
# raw payload to the Boundless Info KV namespace. The Worker normalizes it on read.
#
# It then detects freshly-spawned Sovereign/Exo worlds that lack a closest-world
# distance and scans JUST those immediately (Steam login runs only when there is a
# new world), so a new exo's closest world appears within the 10-minute cycle rather
# than waiting for the 6-hour full pass. Needs the same Steam/Boundless secrets as
# steam-capture for that conditional step.

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes
  workflow_dispatch: {}

concurrency:
  group: poll-worlds
  cancel-in-progress: true

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch live discovery (port 8902)
        run: curl -sS --fail --max-time 60 "https://ds.playboundless.com:8902/list-gameservers" -o worlds.json

      - name: Sanity check payload
        run: node -e "const w=require('./worlds.json'); if(!Array.isArray(w)||w.length===0){console.error('empty/invalid');process.exit(1)}; console.log('worlds:',w.length)"

      - name: Upload raw payload to Cloudflare KV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 kv key put "worlds:raw" --path worlds.json --namespace-id dce399dc16a54d1aad5860cf201c41e9 --remote

      - name: Detect new sovereign/exo worlds without a distance
        id: detect
        run: node detect-new-worlds.mjs

      - name: Install bot dependencies
        if: steps.detect.outputs.has_new == 'true'
        working-directory: bot
        run: npm install --no-audit --no-fund

      - name: Restore Steam refresh token (headless login)
        if: steps.detect.outputs.has_new == 'true'
        working-directory: bot
        run: |
          mkdir -p .steam
          printf '%s' "$STEAM_REFRESH_TOKEN" > .steam/refresh-token.json
        env:
          STEAM_REFRESH_TOKEN: ${{ secrets.STEAM_REFRESH_TOKEN }}

      - name: Scan closest world for the new worlds
        if: steps.detect.outputs.has_new == 'true'
        working-directory: bot
        run: npm run distances -- ${{ steps.detect.outputs.ids }}
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
          BOUNDLESS_USERNAME: ${{ secrets.BOUNDLESS_USERNAME }}
          BOUNDLESS_PASSWORD: ${{ secrets.BOUNDLESS_PASSWORD }}
          BOUNDLESS_ACCOUNT_USERNAME: ${{ secrets.BOUNDLESS_ACCOUNT_USERNAME }}
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
