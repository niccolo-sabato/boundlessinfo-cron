name: Poll live worlds

# Public repo => unlimited free GitHub Actions. Fetches the game's public discovery
# server (port 8902 - Cloudflare Workers cannot, GitHub runners can) and writes the
# raw payload to the Boundless Info KV namespace. The Worker normalizes it on read.
# No game account / API key needed for this job (only a Cloudflare API token).

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes
  workflow_dispatch: {}

concurrency:
  group: poll-worlds
  cancel-in-progress: true

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch live discovery (port 8902)
        run: curl -sS --fail --max-time 60 "https://ds.playboundless.com:8902/list-gameservers" -o worlds.json

      - name: Sanity check payload
        run: node -e "const w=require('./worlds.json'); if(!Array.isArray(w)||w.length===0){console.error('empty/invalid');process.exit(1)}; console.log('worlds:',w.length)"

      - name: Upload raw payload to Cloudflare KV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 kv key put "worlds:raw" --path worlds.json --namespace-id dce399dc16a54d1aad5860cf201c41e9 --remote
