name: Poll live worlds

# Runs every 10 minutes. Two detection paths, so the full live universe is current
# within one cycle:
#
#  1. PUBLIC discovery (port 8902 list-gameservers) -> permanents + public/rented
#     sovereigns. Written to KV only when the stable world set changed (KV write
#     quota is the scarce 1k/day resource).
#  2. FRONTIER probe -> exoworlds + private sovereigns are NOT in the public
#     discovery, so we authenticate and probe a small dynamic id window just above
#     the highest id we already know (ids are incremental). The DS query token is
#     cached 12h and persisted across runs (a 12h-bucketed cache key), so the Steam/
#     Boundless login happens ~twice a day, NOT every cycle - only ~45 lightweight
#     /gameserver probes per cycle.
#
# Any freshly-detected Sovereign OR Exo (no closest-world distance yet) then gets a
# full refresh - resources + block colours + distance - in the same cycle. The 6-hour
# steam-capture remains the backstop that re-captures everything and covers gaps.

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes
  workflow_dispatch: {}

concurrency:
  # Shared with steam-capture: both do a non-atomic read-merge-write of the single
  # worlds:exos KV key, so they must never run at the same time (no lost-update race).
  # cancel-in-progress is false so a poll waits for an in-flight capture rather than
  # cancelling it; polls are short and the capture also discovers worlds meanwhile.
  group: boundless-ingest
  cancel-in-progress: false

env:
  NS: dce399dc16a54d1aad5860cf201c41e9
  STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
  STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
  BOUNDLESS_USERNAME: ${{ secrets.BOUNDLESS_USERNAME }}
  BOUNDLESS_PASSWORD: ${{ secrets.BOUNDLESS_PASSWORD }}
  BOUNDLESS_ACCOUNT_USERNAME: ${{ secrets.BOUNDLESS_ACCOUNT_USERNAME }}
  INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
  DS_DELAY_MS: '200'
  WORLD_DELAY_MS: '200'

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # --- 1. Public discovery (perms + public sovereigns) ---
      - name: Fetch live discovery (port 8902)
        run: curl -sS --fail --max-time 60 "https://ds.playboundless.com:8902/list-gameservers" -o worlds.json

      - name: Sanity check payload
        run: node -e "const w=require('./worlds.json'); if(!Array.isArray(w)||w.length===0){console.error('empty/invalid');process.exit(1)}; console.log('worlds:',w.length)"

      - name: Upload raw payload to Cloudflare KV (only when worlds changed)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@4 kv key get "worlds:raw" --namespace-id "$NS" --remote > prev.json 2>/dev/null || true
          CHANGED=$(node -e '
            const fs = require("fs");
            const strip = (a) => (Array.isArray(a) ? a : [])
              .map(({ _lastUpdate, info, ...rest }) => rest)
              .sort((x, y) => (x.id || 0) - (y.id || 0));
            let prev = [];
            try { prev = JSON.parse(fs.readFileSync("prev.json", "utf8")); } catch {}
            const now = JSON.parse(fs.readFileSync("worlds.json", "utf8"));
            process.stdout.write(JSON.stringify(strip(prev)) === JSON.stringify(strip(now)) ? "no" : "yes");
          ')
          if [ "$CHANGED" = "yes" ]; then
            npx --yes wrangler@4 kv key put "worlds:raw" --path worlds.json --namespace-id "$NS" --remote
            echo "worlds:raw updated (world set changed)"
          else
            echo "worlds:raw unchanged (only volatile fields differ); skipping write"
          fi

      # --- 2. Frontier probe: discover exos / private sovereigns (authenticated) ---
      - name: Install bot dependencies
        working-directory: bot
        run: npm install --no-audit --no-fund

      - name: Restore Steam refresh token (headless login)
        working-directory: bot
        run: |
          mkdir -p .steam
          printf '%s' "$STEAM_REFRESH_TOKEN" > .steam/refresh-token.json
        env:
          STEAM_REFRESH_TOKEN: ${{ secrets.STEAM_REFRESH_TOKEN }}

      # The DS query token is valid ~12h. Bucket the cache key to 12h so a fresh
      # Steam/Boundless login runs at most ~twice a day; every other cycle restores
      # the cached token and only probes /gameserver. (No KV writes involved.)
      - name: Compute 12h token-cache key
        id: bucket
        # 10# forces base-10: `date +%H` is zero-padded (08, 09, 18, 19) and bash would
        # otherwise read those as octal, where 8/9 are invalid digits -> the step errored
        # out at hours 08/09/18/19 UTC and failed the whole poll for those hours.
        run: echo "key=ds-token-$(date -u +%Y%m%d)-$(( 10#$(date -u +%H) / 12 ))" >> "$GITHUB_OUTPUT"

      - name: Restore/persist cached DS query token
        uses: actions/cache@v4
        with:
          path: bot/.cache
          key: ${{ steps.bucket.outputs.key }}

      - name: Compute frontier scan window
        id: frontier
        run: node compute-frontier.mjs

      - name: Discover exo/sovereign frontier (ingest new worlds + resources)
        working-directory: bot
        run: npm run run
        env:
          SCAN_MIN: ${{ steps.frontier.outputs.scan_min }}
          SCAN_MAX: ${{ steps.frontier.outputs.scan_max }}

      # --- 3. Full refresh for any freshly-detected new Sovereign OR Exo ---
      - name: Detect new sovereign/exo worlds without a distance
        id: detect
        run: node detect-new-worlds.mjs

      - name: Refresh resources for the new worlds
        if: steps.detect.outputs.has_new == 'true'
        working-directory: bot
        run: npm run run -- ${{ steps.detect.outputs.ids }}

      - name: Capture block colours for the new worlds
        if: steps.detect.outputs.has_new == 'true'
        working-directory: bot
        run: npm run capture -- ${{ steps.detect.outputs.ids }}

      - name: Scan closest world for the new worlds
        if: steps.detect.outputs.has_new == 'true'
        working-directory: bot
        run: npm run distances -- ${{ steps.detect.outputs.ids }}

      # --- Notify Telegram if any step above failed (best-effort, no-op if unset) ---
      - name: Notify Telegram on failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TG_TOKEN" ] && [ -n "$TG_CHAT" ]; then
            curl -sS -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
              -d chat_id="$TG_CHAT" \
              --data-urlencode "text=Boundless cron FAILED: ${{ github.workflow }} (run #${{ github.run_number }}) ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
