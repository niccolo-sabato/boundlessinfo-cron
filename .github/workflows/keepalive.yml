name: Keepalive

# GitHub disables scheduled workflows after 60 days with no repository activity.
# This makes a tiny empty commit twice a month so the pollers never get disabled.

on:
  schedule:
    - cron: "0 6 1,15 * *" # 1st and 15th of each month
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Empty keepalive commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keepalive"
          git push
